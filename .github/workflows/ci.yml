name: CI

on:
  push:
    branches: [main, public-release-v1]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ai,ui]
      - name: Lint
        run: ruff check .
      - name: Type-check (mypy + baseline)
        run: |
          # mypy runs on edge_catcher/ per pyproject.toml [tool.mypy].
          # mypy-baseline filters out the snapshotted error set in
          # mypy-baseline.txt; CI fails if any NEW type error appears.
          # Shrink the baseline incrementally by fixing real errors.
          mypy 2>&1 | mypy-baseline filter
      - name: Test
        run: pytest tests/ -v
