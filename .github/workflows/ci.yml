name: CI

on:
  push:
    branches: [main, public-release-v1]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ai,ui]
      - name: Lint
        run: ruff check .
      - name: Type-check (mypy + baseline)
        run: |
          # mypy runs on edge_catcher/ per pyproject.toml [tool.mypy].
          # mypy-baseline filters out the snapshotted error set in
          # mypy-baseline.txt; --allow-unsynced means CI fails ONLY on
          # NEW errors (regressions), not on errors that disappeared
          # since the baseline was generated (progress is good — local-vs-CI
          # mypy environment also drifts: cryptography union shape, dep
          # version skew). Shrink the baseline by re-running
          # `mypy-baseline sync` locally and committing the smaller file.
          mypy 2>&1 | mypy-baseline filter --allow-unsynced
      - name: Test
        run: pytest tests/ -v
