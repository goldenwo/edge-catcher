name: CI

on:
  push:
    branches: [main, public-release-v1]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,ai,ui]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest tests/ -v --ignore=tests/test_capture_retention.py
