# Sports market download config — separate from BTC
adapters:
  kalshi:
    enabled: true
    base_url: "https://api.elections.kalshi.com/trade-api/v2"
    rate_limit_seconds: 0.2
    series:
      - KXNBASPREAD  # NBA point spreads (~8,876 settled markets, ~200 trades each, est ~600MB)
      - KXMLBSPREAD  # MLB run spreads (~489 settled markets, ~150 trades each, est ~25MB)
      # KXNBAGAME + KXMLBGAME skipped — moneyline has 18K-50K+ trades/market, too large.
      # Spreads are better for hypothesis testing (more granular strike structure).
    statuses:
      - settled
    min_available_ram_mb: 400
    pagination:
      default_limit: 200
      max_limit: 1000
