# Entertainment series — Spotify charts, awards, media
adapters:
  kalshi:
    enabled: true
    base_url: "https://api.elections.kalshi.com/trade-api/v2"
    rate_limit_seconds: 0.2
    series:
      # Spotify charts (recurring)
      - KXSPOTIFYD        # Spotify daily
      - KXSPOTIFYGLOBALD  # Spotify global daily
      - KXSPOTIFYARTISTD  # Spotify artist daily
      - KXSPOTIFYW        # Spotify weekly
      # Awards
      - KXOSCARAS         # Oscars
      # Other
      - KXLOVEISLANDALLSTAR  # Reality TV
      - KXBOND            # James Bond
      - KXJAMESBOND       # James Bond alt
    statuses:
      - settled
    min_available_ram_mb: 400
    pagination:
      default_limit: 200
      max_limit: 1000
