# Paper Trader Configuration
# Copy to config.local/paper-trader.yaml and customize.

db_path: data/paper_trades_v2.db

ws:
  channels: [ticker, orderbook_delta]
  ping_interval: 20
  reconnect_delay: 30
  price_history_limit: 100

recovery:
  rest_sweep_on_startup: true
  state_flush_interval: 5

strategies:
  my-strategy:
    enabled: true
    series: [SERIES_A, SERIES_B]
    params: {}

sizing:
  risk_per_trade_cents: 200    # $2.00 max risk per trade
  max_slippage_cents: 2        # stop filling beyond best + 2c
  min_fill: 3                  # skip if < 3 contracts fillable

# Paper fill model — picks how the paper executor fills orders. The penalties
# below are hand-tuned starting values, not fitted: treat them as conservative
# guesses pending empirical calibration against live fills.
#   optimistic — (default) walk the visible book at quoted prices. Byte-identical
#                to historical behavior; omit this key entirely to keep it.
#   fixed      — wrap the optimistic fill with a pessimistic per-strategy slippage
#                penalty so paper stops over-promising real-money fill quality.
#                Requires the honest_paper block below.
paper_fill_model: optimistic
# honest_paper:                 # required ONLY when paper_fill_model: fixed
#   default_slippage_cents: 2   # int cents added to each fill (worse for the taker)
#   per_strategy:               # optional overrides; keys must be real strategy names
#     my-strategy: 5

# Orderbook capture pipeline — tees engine input events to disk for
# offline replay. Default disabled; flip to true on the Pi once R2
# credentials are configured. See docs/superpowers/specs/2026-04-14-
# orderbook-capture-replay-design.md
capture:
  enabled: false
  output_dir: data/orderbook_capture
  min_free_gb: 10

  # Transport — where daily bundles are shipped at midnight UTC rotation.
  #   none  — bundles stay on Pi local disk only (no auto-pruning)
  #   local — copy to another local path (tests, dev mirror)
  #   r2    — Cloudflare R2 via boto3 (production). Requires these env vars
  #           on the paper-trader service: CAPTURE_TRANSPORT_BUCKET,
  #           CAPTURE_TRANSPORT_ENDPOINT_URL, CAPTURE_TRANSPORT_ACCESS_KEY_ID,
  #           CAPTURE_TRANSPORT_SECRET_ACCESS_KEY. Write them to a bare
  #           KEY=VALUE file (NOT ~/.bashrc) and EnvironmentFile= it from
  #           the systemd unit.
  transport: none
  # transport_local_root: data/capture_bundles   # only used when transport=local

  # Retention — keeps Pi disk usage bounded.
  # delete_raw_after_bundle: after midnight rotation, delete the raw
  # kalshi_engine_<date>.jsonl file. The zstd-compressed copy inside
  # the bundle dir is authoritative. Disable only for debugging.
  delete_raw_after_bundle: true
  # local_retention_days: prune bundle dirs older than N days — but
  # ONLY if they have a .uploaded sentinel (written after a successful
  # transport upload). Stuck/failed uploads are never auto-deleted.
  # Set to 0 to disable pruning. Ignored when transport=none (pruning
  # requires a transport so local-only mode doesn't silently lose data).
  local_retention_days: 7

  # extra_series: capture-only series the engine subscribes to but never
  # dispatches to any strategy. Lets you record markets for FUTURE strategy
  # research without firing any live trades on them. The tee captures their
  # WS messages, REST recovery snapshots, and ticker discoveries with the
  # same fidelity as strategy series. Strategies for these series can be
  # developed later and backtested against the captured data via the
  # replay backtester.
  #
  # Storage cost: each 15m crypto series adds ~1 active ticker at any time
  # (single binary, single window). Strike-based markets like SERIES_A add
  # ~150-200 tickers per series. Estimate disk before enabling broad capture.
  # extra_series: [SERIES_A, SERIES_B]

# Optional: spot data for on_tick strategies that price time-to-expiry.
# Disabled by default — absent/enabled:false means no OHLC provider (no behavior change).
# assets maps asset -> [sqlite_db_path, table_name]; the engine injects a shared
# read-only OHLCProvider onto every strategy's `self.ohlc` when enabled.
ohlc:
  enabled: false
  assets:
    eth: [data/ohlc.db, eth_ohlc]
    sol: [data/ohlc.db, sol_ohlc]
    doge: [data/ohlc.db, doge_ohlc]

# Optional: continuous Coinbase OHLC refresher (Phase 2b). A SEPARATE service
# (deploy/ohlc-refresher.service) reads THIS block and keeps the ohlc.db tables
# in the `ohlc:` block above ≤90s fresh for on_tick strategies. Disabled by default.
# Requires NTP time sync on the host (see deploy docs) — the staleness gate
# compares candle timestamps to local wall-clock.
ohlc_refresh:
  enabled: false
  db_path: data/ohlc.db
  products: [ETH-USD, SOL-USD, DOGE-USD]   # -> eth_ohlc / sol_ohlc / doge_ohlc
  poll_interval_s: 20      # <=30 keeps the forming bar within the 90s staleness gate
  staleness_warn_s: 75     # WARN if any product's newest bar is older than this
  startup_lookback_s: 7200 # backfill window on boot when a table is empty
  carry_forward: true      # synth current-minute bar from last close if the forming bar lags
