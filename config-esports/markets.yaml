# Esports series — CS2, LoL, J.League
# CS2 has the highest event count of any sports series (74 events)
adapters:
  kalshi:
    enabled: true
    base_url: "https://api.elections.kalshi.com/trade-api/v2"
    rate_limit_seconds: 0.2
    series:
      - KXCS2MAP         # CS2 map winner (74 events — highest)
      - KXCS2GAME        # CS2 game winner (32 events)
      - KXCS2TOTALMAPS   # CS2 total maps (28 events)
      - KXATPSETWINNER   # ATP tennis set winner (14 events)
      - KXJBLEAGUEGAME   # J-League game (13 events)
      - KXLOLMAP         # LoL map winner (7 events)
    statuses:
      - settled
    min_available_ram_mb: 400
    pagination:
      default_limit: 200
      max_limit: 1000
